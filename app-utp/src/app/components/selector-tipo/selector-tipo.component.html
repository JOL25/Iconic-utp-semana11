<ion-card>
  <ion-card-header>
    <ion-card-title>Cambiar tipo de app</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <ion-button expand="block" color="danger" (click)="elegir('App academica')">
      <ion-icon slot="start" name="school-outline"></ion-icon>
      App academica
    </ion-button>

    <ion-button expand="block" fill="outline" color="medium" (click)="elegir('App de ventas')">
      <ion-icon slot="start" name="cart-outline"></ion-icon>
      App de ventas
    </ion-button>

    <ion-button expand="block" fill="outline" color="medium" (click)="elegir('App de soporte')">
      <ion-icon slot="start" name="help-circle-outline"></ion-icon>
      App de soporte
    </ion-button>
  </ion-card-content>
</ion-card>
